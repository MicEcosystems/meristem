name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install packages (no heavy ML extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/meristem-core \
                      -e packages/meristem-models-cellpose \
                      -e packages/meristem-trackers \
                      -e packages/meristem-napari \
                      pytest ruff pyyaml

      - name: Lint
        run: ruff check packages

      - name: Test
        run: pytest -q
