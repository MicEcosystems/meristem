[pytest]
# Workspace-level config so `pytest` from the repo root discovers every package's tests and
# knows the shared custom markers (each package also declares these for standalone runs).
testpaths =
    packages/meristem-core/tests
    packages/meristem-models-cellpose/tests
    packages/meristem-trackers/tests
markers =
    slow: real model inference; requires the heavy ML library to be installed
